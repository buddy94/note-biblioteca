<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 Nota</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f14;
  --bg-card: #1a1a23;
  --bg-hover: #22222e;
  --text: #e4e4ec;
  --text-muted: #9090a8;
  --border: #2a2a3a;
  --accent: #6366f1;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(15, 15, 20, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.topbar .back-btn {
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  text-decoration: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.topbar .back-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.topbar .note-title {
  flex: 1;
  font-size: 1rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.topbar .cat-badge {
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
}
.topbar .topbar-btn {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
.topbar .topbar-btn:hover { color: var(--text); border-color: var(--accent); }
.topbar .fav-btn.active { color: #f59e0b; border-color: #f59e0b; background: rgba(245,158,11,0.1); }

/* ===== CONTENT ===== */
.content-wrapper {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.content-wrapper.print-mode { max-width: 100%; }

/* Markdown Rendering */
.note-content h1 { font-size: 2rem; font-weight: 700; margin: 32px 0 16px; color: #fff; }
.note-content h2 { font-size: 1.5rem; font-weight: 600; margin: 28px 0 14px; color: #e2e2f0; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.note-content h3 { font-size: 1.2rem; font-weight: 600; margin: 24px 0 10px; color: #d0d0e0; }
.note-content h4 { font-size: 1rem; font-weight: 600; margin: 20px 0 8px; color: var(--text-muted); }
.note-content p { margin: 12px 0; }
.note-content strong { color: #fff; font-weight: 600; }
.note-content em { color: #c0c0d4; }
.note-content a { color: var(--accent); text-decoration: none; }
.note-content a:hover { text-decoration: underline; }

.note-content ul, .note-content ol { margin: 12px 0; padding-left: 24px; }
.note-content li { margin: 6px 0; }
.note-content li::marker { color: var(--text-muted); }

.note-content blockquote {
  border-left: 3px solid var(--accent);
  padding: 12px 20px;
  margin: 16px 0;
  background: var(--bg-card);
  border-radius: 0 var(--radius) var(--radius) 0;
  color: #b0b0cc;
  font-style: italic;
}

.note-content code {
  font-family: var(--mono);
  font-size: 0.85em;
  background: var(--bg-hover);
  padding: 2px 6px;
  border-radius: 4px;
  color: #f59e0b;
}

.note-content pre {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  overflow-x: auto;
  margin: 16px 0;
}
.note-content pre code {
  background: none;
  color: var(--text);
  padding: 0;
}

.note-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 32px 0;
}

.note-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
}
.note-content th, .note-content td {
  padding: 10px 14px;
  border: 1px solid var(--border);
  text-align: left;
}
.note-content th { background: var(--bg-card); font-weight: 600; }
.note-content tr:hover td { background: var(--bg-hover); }

.note-content img {
  max-width: 100%;
  border-radius: var(--radius);
  margin: 16px 0;
}

/* ===== LOADING ===== */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== PRINT ===== */
@media print {
  body { background: #fff; color: #000; font-size: 11pt; }
  .topbar { display: none; }
  .content-wrapper { max-width: 100%; padding: 0 20px; }
  .note-content { color: #000; }
  .note-content h1, .note-content h2, .note-content h3, .note-content h4 { color: #000; }
  .note-content strong { color: #000; }
  .note-content blockquote { border-left-color: #333; background: #f5f5f5; color: #333; }
  .note-content code { background: #eee; color: #333; }
  .note-content pre { border-color: #ccc; background: #f5f5f5; }
  .note-content a { color: #0066cc; }
  .note-divider { break-after: page; }
}

/* ===== MULTI-NOTE DIVIDER ===== */
.note-divider {
  border: none;
  border-top: 2px dashed var(--border);
  margin: 48px 0;
}
.note-section-title {
  font-size: 1.6rem;
  font-weight: 700;
  margin: 40px 0 20px;
  color: #fff;
  text-align: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .topbar { padding: 10px 16px; }
  .content-wrapper { padding: 24px 16px 60px; }
  .topbar .note-title { font-size: 0.85rem; }
  .topbar .topbar-btn { font-size: 0.7rem; padding: 6px 10px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<nav class="topbar" id="topbar">
  <a href="index.html" class="back-btn">← Biblioteca</a>
  <span class="note-title" id="note-title">Caricamento...</span>
  <span class="cat-badge" id="cat-badge" style="display:none"></span>
  <button class="topbar-btn fav-btn" id="fav-btn" onclick="toggleFav()" title="Aggiungi/Rimuovi preferito">⭐</button>
  <button class="topbar-btn" onclick="window.print()" title="Stampa / Salva come PDF">🖨️ PDF</button>
</nav>

<!-- Content -->
<div class="content-wrapper" id="content-wrapper">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Caricamento nota...</p>
  </div>
  <div class="note-content" id="note-content" style="display:none"></div>
</div>

<script>
/* ===== INIT ===== */
let manifest = null;
let currentNoteFile = null;
let favorites = JSON.parse(localStorage.getItem('ghpages_favorites') || '[]');

async function init() {
  // Load manifest
  try {
    const resp = await fetch('manifest.json');
    manifest = await resp.json();
  } catch(e) {
    showError('Impossibile caricare il manifest');
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const singleNote = params.get('note');
  const multiNotes = params.get('notes');
  const printMode = params.get('print');
  const multiTitle = params.get('title');

  if (printMode) {
    document.getElementById('content-wrapper').classList.add('print-mode');
  }

  if (singleNote) {
    await loadSingleNote(singleNote, printMode);
  } else if (multiNotes) {
    const files = multiNotes.split(',');
    await loadMultipleNotes(files, multiTitle, printMode);
  }
}

async function loadSingleNote(filename, autoPrint) {
  currentNoteFile = filename;
  const note = manifest?.notes.find(n => n.filename === filename);
  const title = note?.title || filename.replace('.md', '');
  
  document.getElementById('note-title').textContent = title;
  document.title = '📖 ' + title;
  
  // Category badge
  if (note && manifest.categories[note.category]) {
    const cat = manifest.categories[note.category];
    const badge = document.getElementById('cat-badge');
    badge.style.display = 'inline-block';
    badge.style.background = `color-mix(in srgb, ${cat.color} 15%, transparent)`;
    badge.style.color = cat.color;
    badge.textContent = cat.icon + ' ' + cat.category_name;
  }
  
  // Favorite button
  updateFavBtn(filename);
  
  // Load markdown
  try {
    const resp = await fetch('notes/' + filename);
    if (!resp.ok) throw new Error('File not found');
    const md = await resp.text();
    
    document.getElementById('loading').style.display = 'none';
    
    const content = document.getElementById('note-content');
    content.style.display = 'block';
    content.innerHTML = marked.parse(md);
    
    if (autoPrint) {
      setTimeout(() => window.print(), 800);
    }
  } catch(e) {
    showError('Nota non trovata: ' + filename);
  }
}

async function loadMultipleNotes(files, title, autoPrint) {
  document.getElementById('note-title').textContent = title || 'Note multiple';
  document.title = '📚 ' + (title || 'Note multiple');
  
  document.getElementById('loading').style.display = 'none';
  const content = document.getElementById('note-content');
  content.style.display = 'block';
  
  let html = '';
  for (const filename of files) {
    const note = manifest?.notes.find(n => n.filename === filename);
    const noteTitle = note?.title || filename.replace('.md', '');
    
    try {
      const resp = await fetch('notes/' + filename);
      if (!resp.ok) continue;
      const md = await resp.text();
      
      html += `<h2 class="note-section-title">${noteTitle}</h2>`;
      html += marked.parse(md);
      html += '<hr class="note-divider">';
    } catch(e) {
      html += `<p style="color:var(--text-muted)">⚠️ Impossibile caricare: ${filename}</p>`;
    }
  }
  
  content.innerHTML = html;
  
  if (autoPrint) {
    setTimeout(() => window.print(), 1000);
  }
}

/* ===== FAVORITES ===== */
function updateFavBtn(filename) {
  const btn = document.getElementById('fav-btn');
  if (favorites.includes(filename)) {
    btn.classList.add('active');
    btn.textContent = '⭐';
  } else {
    btn.classList.remove('active');
    btn.textContent = '☆';
  }
}

function toggleFav() {
  if (!currentNoteFile) return;
  const idx = favorites.indexOf(currentNoteFile);
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push(currentNoteFile);
  }
  localStorage.setItem('ghpages_favorites', JSON.stringify(favorites));
  updateFavBtn(currentNoteFile);
}

/* ===== ERROR ===== */
function showError(msg) {
  document.getElementById('loading').innerHTML = `
    <p style="color:#ef4444">⚠️ ${msg}</p>
    <a href="index.html" style="color:var(--accent);margin-top:12px;display:inline-block">← Torna alla biblioteca</a>
  `;
}

/* ===== KEYBOARD ===== */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    window.location.href = 'index.html';
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'p') {
    e.preventDefault();
    window.print();
  }
});

init();
</script>
</body>
</html>
