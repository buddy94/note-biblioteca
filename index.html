<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>📚 Note Biblioteca</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f14;
  --bg-card: #1a1a23;
  --bg-hover: #22222e;
  --text: #e4e4ec;
  --text-muted: #9090a8;
  --border: #2a2a3a;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.3);
  --radius: 12px;
  --transition: 0.2s ease;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --sidebar-w: 280px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  line-height: 1.6;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
.sidebar-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-header .subtitle {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Categories */
.categories-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.categories-section h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.category-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.9rem;
  position: relative;
  margin-bottom: 2px;
}
.category-item:hover { background: var(--bg-hover); }
.category-item.active { background: var(--accent-glow); }
.category-item .icon { font-size: 1.2rem; width: 24px; text-align: center; }
.category-item .name { flex: 1; }
.category-item .count {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
}
.category-item.all-notes { color: var(--text); }
.category-item.all-notes .icon { color: #f59e0b; }

/* Favorites Section */
.favorites-section {
  padding: 16px 20px;
  flex: 1;
  overflow-y: auto;
}
.favorites-section h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.favorites-section h3 .star { color: #f59e0b; }
.favorites-list {
  min-height: 40px;
  border: 1px dashed transparent;
  border-radius: 8px;
  transition: border-color var(--transition);
}
.favorites-list.drag-over { border-color: var(--accent); background: var(--accent-glow); }
.fav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: grab;
  transition: all var(--transition);
  font-size: 0.85rem;
  background: var(--bg);
  margin-bottom: 2px;
}
.fav-item:hover { background: var(--bg-hover); }
.fav-item.dragging { opacity: 0.5; transform: scale(0.95); }
.fav-item .drag-handle { color: var(--text-muted); cursor: grab; font-size: 0.8rem; }
.fav-item .fav-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fav-item .remove-fav {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 1rem; padding: 2px 4px;
  border-radius: 4px; transition: all var(--transition);
}
.fav-item .remove-fav:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
.no-favs {
  color: var(--text-muted);
  font-size: 0.8rem;
  text-align: center;
  padding: 20px 10px;
  font-style: italic;
}

/* ===== MAIN CONTENT ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 24px 32px;
  min-height: 100vh;
}

/* Search & Actions */
.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 240px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.9rem;
  transition: all var(--transition);
}
.search-box input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
}
.export-btn {
  padding: 10px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.export-btn:hover { background: var(--bg-hover); border-color: var(--accent); }

/* Notes count */
.notes-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.notes-header h2 {
  font-size: 1.1rem;
  font-weight: 600;
}
.notes-count { font-size: 0.85rem; color: var(--text-muted); }

/* Notes Grid */
.notes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.note-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--note-color);
}
.note-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  border-color: var(--note-color);
}
.note-card .cat-badge {
  display: inline-block;
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 20px;
  background: color-mix(in srgb, var(--note-color) 15%, transparent);
  color: var(--note-color);
  margin-bottom: 10px;
  font-weight: 500;
}
.note-card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.3;
}
.note-card .note-excerpt {
  font-size: 0.8rem;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 8px;
}
.note-card .note-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  opacity: 0;
  transition: opacity var(--transition);
}
.note-card:hover .note-actions { opacity: 1; }
.note-actions button {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  padding: 4px 10px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
}
.note-actions button:hover { color: var(--text); }
.note-actions .fav-btn.active { color: #f59e0b; border-color: #f59e0b; background: rgba(245,158,11,0.1); }

/* ===== MOBILE TOGGLE ===== */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 200;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  cursor: pointer;
  font-size: 1.2rem;
}

/* ===== OVERLAY ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
.overlay.show { display: block; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; }
  .mobile-toggle { display: block; }
  .notes-grid { grid-template-columns: 1fr; }
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }
</style>
</head>
<body>

<!-- Mobile Toggle -->
<button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📚 Note Biblioteca</h1>
    <div class="subtitle">Collezione personale</div>
  </div>

  <div class="categories-section">
    <h3>Categorie</h3>
    <div id="categories-list">
      <div class="category-item all-notes active" data-category="all" onclick="filterByCategory('all')">
        <span class="icon">📋</span>
        <span class="name">Tutte le note</span>
        <span class="count" id="count-all">24</span>
      </div>
    </div>
  </div>

  <div class="favorites-section">
    <h3><span class="star">⭐</span> Preferiti <span style="font-weight:400;font-size:0.7rem;margin-left:auto;color:var(--text-muted)">trascina per riordinare</span></h3>
    <div class="favorites-list" id="favorites-list" 
         ondragover="handleDragOver(event)" 
         ondragleave="handleDragLeave(event)" 
         ondrop="handleDrop(event)">
      <p class="no-favs" id="no-favs">⭐ Clicca la stella su una nota per aggiungerla ai preferiti</p>
    </div>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main">
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Cerca nelle note..." oninput="filterNotes()">
    </div>
    <button class="export-btn" onclick="exportAllPDF()" title="Esporta tutto in PDF">🖨️ Esporta PDF</button>
  </div>

  <div class="notes-header">
    <h2 id="section-title">Tutte le note</h2>
    <span class="notes-count" id="notes-count">24 note</span>
  </div>

  <div class="notes-grid" id="notes-grid">
    <!-- Populated by JS -->
  </div>
</main>

<script>
/* ===== STATE ===== */
let manifest = null;
let currentCategory = 'all';
let searchQuery = '';
let favorites = JSON.parse(localStorage.getItem('ghpages_favorites') || '[]');

/* ===== LOAD ===== */
async function init() {
  try {
    const resp = await fetch('manifest.json', {cache: 'no-cache'});
    manifest = await resp.json();
  } catch(e) {
    console.error('Failed to load manifest:', e);
    document.getElementById('notes-grid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Impossibile caricare il manifest.</p></div>';
    return;
  }
  buildCategories();
  renderFavorites();
  renderNotes();
}

/* ===== CATEGORIES ===== */
function buildCategories() {
  const container = document.getElementById('categories-list');
  const cats = manifest.categories;
  
  for (const [key, cat] of Object.entries(cats)) {
    const count = manifest.notes.filter(n => n.category === key).length;
    const div = document.createElement('div');
    div.className = 'category-item';
    div.dataset.category = key;
    div.onclick = () => filterByCategory(key);
    div.innerHTML = `
      <span class="icon">${cat.icon}</span>
      <span class="name">${cat.name}</span>
      <span class="count">${count}</span>
    `;
    container.appendChild(div);
  }
  
  // Update total count
  document.getElementById('count-all').textContent = manifest.notes.length;
  document.getElementById('notes-count').textContent = `${manifest.notes.length} note`;
}

/* ===== RENDER NOTES ===== */
function renderNotes() {
  const grid = document.getElementById('notes-grid');
  let notes = [...manifest.notes];
  
  // Filter by category
  if (currentCategory !== 'all') {
    notes = notes.filter(n => n.category === currentCategory);
  }
  
  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    notes = notes.filter(n => n.title.toLowerCase().includes(q) || n.category_name.toLowerCase().includes(q));
  }
  
  // Update header
  const catName = currentCategory === 'all' ? 'Tutte le note' : manifest.categories[currentCategory]?.name || '';
  document.getElementById('section-title').textContent = catName;
  document.getElementById('notes-count').textContent = `${notes.length} note`;
  
  if (notes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="icon">📭</div>
        <p>Nessuna nota trovata</p>
      </div>`;
    return;
  }
  
  grid.innerHTML = notes.map(n => {
    const cat = manifest.categories[n.category];
    const color = cat?.color || '#6366f1';
    const isFav = favorites.includes(n.filename);
    
    return `
    <div class="note-card" style="--note-color: ${color}" onclick="openNote('${n.filename}', event)">
      <span class="cat-badge">${cat?.icon || ''} ${n.category_name}</span>
      <h3>${n.title}</h3>
      <div class="note-actions" onclick="event.stopPropagation()">
        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${n.filename}', this)" title="Preferito">⭐</button>
        <button onclick="exportNotePDF('${n.filename}', '${n.title.replace(/'/g, "\\'")}')" title="Esporta PDF">📄</button>
      </div>
    </div>`;
  }).join('');
}

/* ===== FILTERS ===== */
function filterByCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.querySelector(`.category-item[data-category="${cat}"]`) || document.querySelector('.category-item.all-notes');
  if (activeEl) activeEl.classList.add('active');
  renderNotes();
}

function filterNotes() {
  searchQuery = document.getElementById('search-input').value;
  renderNotes();
}

/* ===== NAVIGATION ===== */
function openNote(filename, event) {
  // Don't open if clicking fav button
  if (event && event.target.closest('.note-actions')) return;
  window.location.href = `note.html?note=${encodeURIComponent(filename)}`;
}

/* ===== FAVORITES ===== */
function toggleFavorite(filename, btn) {
  const idx = favorites.indexOf(filename);
  if (idx >= 0) {
    favorites.splice(idx, 1);
    if (btn) btn.classList.remove('active');
  } else {
    favorites.push(filename);
    if (btn) btn.classList.add('active');
  }
  saveFavorites();
  renderFavorites();
  renderNotes(); // Update all cards
}

function saveFavorites() {
  localStorage.setItem('ghpages_favorites', JSON.stringify(favorites));
}

function renderFavorites() {
  const list = document.getElementById('favorites-list');
  const noFavs = document.getElementById('no-favs');
  
  // Remove existing fav items (keep no-favs)
  list.querySelectorAll('.fav-item').forEach(el => el.remove());
  
  if (favorites.length === 0) {
    noFavs.style.display = 'block';
    return;
  }
  
  noFavs.style.display = 'none';
  
  favorites.forEach((filename, index) => {
    const note = manifest.notes.find(n => n.filename === filename);
    if (!note) return;
    
    const div = document.createElement('div');
    div.className = 'fav-item';
    div.draggable = true;
    div.dataset.index = index;
    div.dataset.filename = filename;
    div.onclick = () => openNote(filename);
    
    div.addEventListener('dragstart', handleDragStart);
    div.addEventListener('dragend', handleDragEnd);
    
    div.innerHTML = `
      <span class="drag-handle">⋮⋮</span>
      <span class="fav-title">${note.title}</span>
      <button class="remove-fav" onclick="event.stopPropagation(); toggleFavorite('${filename}')" title="Rimuovi">✕</button>
    `;
    
    list.appendChild(div);
  });
}

/* ===== DRAG & DROP ===== */
let draggedItem = null;

function handleDragStart(e) {
  draggedItem = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.dataset.filename);
}

function handleDragEnd(e) {
  this.classList.remove('dragging');
  draggedItem = null;
  document.getElementById('favorites-list').classList.remove('drag-over');
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('favorites-list').classList.add('drag-over');
}

function handleDragLeave(e) {
  document.getElementById('favorites-list').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('favorites-list').classList.remove('drag-over');
  
  const filename = e.dataTransfer.getData('text/plain');
  if (!filename) return;
  
  // Get drop position
  const afterElement = getDragAfterElement(document.getElementById('favorites-list'), e.clientY);
  const fromIndex = favorites.indexOf(filename);
  
  if (fromIndex >= 0) {
    favorites.splice(fromIndex, 1);
    
    if (afterElement) {
      const toIndex = favorites.indexOf(afterElement.dataset.filename);
      favorites.splice(toIndex, 0, filename);
    } else {
      favorites.push(filename);
    }
    
    saveFavorites();
    renderFavorites();
  }
}

function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.fav-item:not(.dragging)')];
  
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* ===== PDF EXPORT ===== */
function exportNotePDF(filename, title) {
  window.open(`note.html?note=${encodeURIComponent(filename)}&print=1`, '_blank');
}

function exportAllPDF() {
  // Open print view with all notes
  const noteParams = manifest.notes.map(n => encodeURIComponent(n.filename)).join(',');
  window.open(`note.html?notes=${noteParams}&title=Tutte+le+note&print=1`, '_blank');
}

/* ===== SIDEBAR TOGGLE ===== */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ===== KEYBOARD ===== */
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl+K = focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  // Escape = clear search
  if (e.key === 'Escape') {
    document.getElementById('search-input').value = '';
    searchQuery = '';
    renderNotes();
  }
});

// Init
init();
</script>
</body>
</html>
